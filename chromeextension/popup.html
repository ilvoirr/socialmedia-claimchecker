<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Claim Radar</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <div class="dot-grid"></div>
    <div class="layout">

      <!-- HEADER -->
      <header class="header">
        <div class="header-left">
          <div class="logo-box">
            <div class="logo-inner"></div>
          </div>
          <div class="title-block">
            <h1 class="app-title">Claim Radar</h1>
            <p class="app-sub">Fact-Check Copilot</p>
          </div>
        </div>
        <div id="analyze-indicator" class="analyzing-badge" style="display:none">
          <span class="bdot" style="animation-delay:0ms"></span>
          <span class="bdot" style="animation-delay:120ms"></span>
          <span class="bdot" style="animation-delay:240ms"></span>
          <span class="analyzing-text">Analyzing</span>
        </div>
      </header>

      <!-- INPUT PHASE -->
      <div id="phase-input" class="phase-input" style="display:none">
        <div class="input-wrapper">
          <div class="textarea-wrap">
            <textarea
              id="claim-input"
              class="claim-textarea"
              placeholder="Paste a claim to verify… (Enter to submit · Shift+Enter for newline · paste image)"
            ></textarea>
            <span id="char-count" class="char-count"></span>
          </div>

          <div id="image-preview" class="image-preview" style="display:none">
            <img id="preview-img" class="preview-img" src="" alt="Attached image">
            <div class="preview-info">
              <span class="preview-title">Image attached</span>
              <span class="preview-sub">Decoded before analysis</span>
            </div>
            <button id="remove-image-btn" class="remove-btn">✕</button>
          </div>

          <div class="controls-row">
            <div class="controls-left">
              <input type="file" id="file-input" accept="image/*" style="display:none">
              <button id="attach-btn" class="icon-btn">⊕ Image</button>
              <button id="snip-btn" class="icon-btn">✂ Snip</button>
            </div>
            <button id="analyze-btn" class="analyze-btn" disabled>
              Verify →
            </button>
          </div>
        </div>
      </div>

      <!-- PROCESSING PHASE -->
      <div id="phase-processing" class="phase-processing" style="display:none">
        <div class="progress-header">
          <span class="progress-label">Debate in progress</span>
          <div class="progress-right" id="progress-right" style="display:none">
            <div class="progress-track">
              <div id="progress-fill" class="progress-fill" style="width:0%"></div>
            </div>
            <span id="turn-count-label" class="turn-count-label">0 / 6</span>
          </div>
        </div>

        <div class="scroll-container" id="scroll-container">
          <div id="dialogue-area" class="dialogue-area"></div>
          <div id="thinking-row" class="thinking-row" style="display:none">
            <div class="tdots">
              <span class="tdot" style="animation-delay:0ms"></span>
              <span class="tdot" style="animation-delay:140ms"></span>
              <span class="tdot" style="animation-delay:280ms"></span>
            </div>
            <span id="thinking-label" class="thinking-label"></span>
          </div>
        </div>
        <div class="scroll-fade"></div>
      </div>

      <!-- VERDICT PHASE -->
      <div id="phase-verdict" class="phase-verdict" style="display:none">
        <div id="verdict-card" class="verdict-card">
          <div class="verdict-top">
            <div>
              <span class="section-label">Verdict</span>
              <h2 id="verdict-text" class="verdict-text"></h2>
              <span id="verdict-meta" class="verdict-meta"></span>
            </div>
            <div class="confidence-block">
              <span class="section-label">Confidence</span>
              <div class="confidence-row">
                <span id="confidence-val" class="confidence-val">0</span>
                <span class="confidence-pct">%</span>
              </div>
              <div class="confidence-track">
                <div id="confidence-bar" class="confidence-bar" style="width:0%"></div>
              </div>
            </div>
          </div>

          <div class="verdict-summary">
            <span class="section-label">Summary</span>
            <p id="summary-text" class="summary-text"></p>
          </div>

          <div class="verdict-footer">
            <span id="verdict-sub" class="verdict-sub-text"></span>
            <button id="new-query-btn" class="new-query-btn">← New Query</button>
          </div>
        </div>
      </div>

    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
